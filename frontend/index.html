<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esay Cloud Skills</title>
    <link rel="stylesheet" href="./ui/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="toolbar">
        <div class="toolbar-left">
          <h1 data-i18n="title">Esay Cloud Skills</h1>
          <span id="path-badge" class="path-badge">—</span>
        </div>

        <div class="toolbar-right">
          <div class="lang-switch" role="group" aria-label="Language switch">
            <button id="lang-zh" class="lang-button active">中文</button>
            <button id="lang-en" class="lang-button">EN</button>
          </div>
          <button id="refresh-button" class="button primary" data-i18n="refreshButton" data-i18n-title="refreshHelp">刷新</button>
          <button id="open-local-button" class="button secondary" data-i18n="openLocalButton" data-i18n-title="openLocalHelp">打开本地目录</button>
          <button id="open-icloud-button" class="button secondary" data-i18n="openICloudButton" data-i18n-title="openICloudHelp">打开 iCloud 目录</button>
          <div class="more-menu">
            <button id="more-button" class="button ghost" data-i18n="moreButton" data-i18n-title="moreHelp">更多</button>
            <div id="more-panel" class="more-panel hidden">
              <label class="menu-checkbox" data-i18n-title="linkCopyHelp">
                <input type="checkbox" id="link-copy-checkbox" />
                <span data-i18n="linkCopyLabel">接入时使用复制（保留备份）</span>
              </label>
              <button id="link-button" class="menu-item" data-i18n="linkButton" data-i18n-title="linkHelp">接入</button>
              <button id="unlink-button" class="menu-item" data-i18n="unlinkButton" data-i18n-title="unlinkHelp">取消接入</button>
              <button id="restore-button" class="menu-item" data-i18n="restoreButton" data-i18n-title="restoreHelp">恢复备份</button>
              <button id="setup-button" class="menu-item" data-i18n="setupButton" data-i18n-title="setupHelp">初始化 iCloud</button>
              <button id="init-config-button" class="menu-item" data-i18n="initConfigButton" data-i18n-title="initConfigHelp">重置默认配置</button>
              <button id="restore-machine-button" class="menu-item" data-i18n="restoreMachineButton" data-i18n-title="restoreMachineHelp">恢复本机环境</button>
            </div>
          </div>
        </div>
      </header>

      <nav id="tool-tabs" class="tool-tabs" aria-label="Tool tabs"></nav>

      <main class="list-shell">
        <section class="list-header">
          <div class="list-header-text">
            <h2 id="current-tool-title">全局</h2>
            <p id="current-tool-description" class="list-desc">—</p>
            <p id="sync-hint" class="sync-hint" hidden>—</p>
            <p id="path-mismatch-note" class="sync-hint sync-hint--warn" hidden></p>
          </div>
          <div class="list-meta">
            <span id="status-text" class="subtle">—</span>
            <span id="count-text" class="subtle">0</span>
          </div>
        </section>

        <section class="table-shell">
          <table class="skills-table">
            <thead>
              <tr>
                <th data-i18n="nameColumn">名称</th>
                <th data-i18n="pathColumn">路径</th>
                <th data-i18n="updatedColumn">更新时间</th>
                <th data-i18n="actionsColumn">操作</th>
              </tr>
            </thead>
            <tbody id="skills-table-body"></tbody>
          </table>
          <div id="empty-state" class="empty-state" data-i18n="emptyState">这个分类下还没有 skill。</div>
        </section>
      </main>
    </div>

    <template id="skill-row-template">
      <tr>
        <td class="col-name">
          <div class="skill-name"></div>
          <div class="skill-kind"></div>
          <div class="skill-spec" hidden></div>
        </td>
        <td class="col-path">
          <div class="skill-path"></div>
        </td>
        <td class="col-updated">
          <div class="skill-updated"></div>
        </td>
        <td class="col-actions">
          <div class="row-actions">
            <button class="mini-button skill-open" data-i18n="openButton" data-i18n-title="openButtonHelp">打开</button>
            <button class="mini-button skill-copy" data-i18n="copyButton" data-i18n-title="copyButtonHelp">复制</button>
            <button class="mini-button danger skill-delete" data-i18n="deleteButton" data-i18n-title="deleteButtonHelp">删除</button>
          </div>
        </td>
      </tr>
    </template>

    <script type="module" src="./ui/app.js"></script>
  </body>
</html>
